# Source Files
source = $HOME/.config/hypr/monitors.conf
source = $HOME/.config/hypr/startup.conf
source = $HOME/.config/hypr/inputs.conf
source = $HOME/.config/hypr/keybinds.conf
source = $HOME/.config/hypr/windowrules.conf
source = $HOME/.config/hypr/animations.conf
source = $HOME/.config/hypr/themes/theme.conf


# Layouts
# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/
dwindle {
    pseudotile = yes
    preserve_split = yes
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/
master {
    new_status = master
}


# Misc
# See https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    vrr = 0                      # 0=OFF 1=ON 2=FULLSCREEN ONLY
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    anr_missed_pings = 5
    allow_session_lock_restore = true
}

xwayland {
    force_zero_scaling = true
}

general {
    snap {                       # snapping for floating windows
        enabled = true
    }
}


# >>> HYPRLAND VISUAL EDITOR START <<<
# 1. Active Uninstall Watchdog
exec-once = /home/jay/.cache/noctalia/HVE/hve_watchdog.sh
# 2. Variable Definition (Color Palette)
source = /home/jay/.config/hypr/noctalia/noctalia-colors.conf
# 3. Effects Application (Visual Editor)
source = /home/jay/.cache/noctalia/HVE/overlay.conf
# >>> HYPRLAND VISUAL EDITOR END <<<
